<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovi Smartphone - Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
    <header class="header">
        <h1>JOVI</h1>
        <p>SMARTPHONE</p>
    </header>

    <main class="login-card">
        <div class="slideshow-container">
            <div class="slide-content" id="slide-box">
                <i class="fab fa-google" id="slide-icon"></i>
                <p id="slide-text">Entre com sua conta Google</p>
            </div>
        </div>

        <h2>Login</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="E-mail" required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="********" required>
                <i class="fas fa-eye" id="togglePassword" style="cursor: pointer;"></i>
            </div>

            <button type="submit" id="btnEntrar">Entrar</button>
        </form>

        <p class="forgot-password">Esqueceu a senha? <a href="#">Recuperar</a></p>

        <div class="divider">
            <span>ou entre com</span>
        </div>

        <div class="social-login">
            <button class="social-btn"><i class="fab fa-google"></i></button>
            <button class="social-btn"><i class="fab fa-facebook-f"></i></button>
            <button class="social-btn"><i class="fab fa-twitter"></i></button>
        </div>

        <p class="signup">Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </main>
</div>

    <script src="script.js"></script>
</body>
</html>
