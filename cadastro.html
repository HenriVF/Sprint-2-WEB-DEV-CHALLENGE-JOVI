<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jovi Smartphone - Cadastro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/your-code.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>JOVI</h1>
            <p>CADASTRO</p>
        </header>

        <main class="login-card">
            <h2>Crie sua conta</h2>
            
            <form id="cadastroForm">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="nome" placeholder="Nome Completo" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="emailCadastro" placeholder="E-mail" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="senhaCadastro" placeholder="Senha" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="confirmarSenha" placeholder="Confirme a senha" required>
                </div>

                <button type="submit" id="btnEntrar">Cadastrar</button>    
            </form>

            <p class="signup" style="text-align: center; margin-top: 20px;">
            Já tem uma conta? <a href="index.html">Faça Login</a>
            </p>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
